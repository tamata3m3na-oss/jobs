name: mobile
description: Smart Job Platform Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1

  # State Management - Riverpod
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^5.0.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  flutter_svg: ^2.0.7
  share_plus: ^7.2.1
  file_picker: ^6.1.1

  # Storage
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true