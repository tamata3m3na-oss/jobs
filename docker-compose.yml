version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: smartjob-postgres
    environment:
      POSTGRES_USER: smartjob
      POSTGRES_PASSWORD: smartjob_dev_password
      POSTGRES_DB: smartjob_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartjob -d smartjob_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartjob-network

  redis:
    image: redis:7-alpine
    container_name: smartjob-redis
    command: redis-server --appendonly yes --requirepass smartjob_redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', '--pass', 'smartjob_redis_password', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smartjob-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartjob-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=smartjob_db
      - DATABASE_USER=smartjob
      - DATABASE_PASSWORD=smartjob_dev_password
      - DATABASE_URL=postgresql://smartjob:smartjob_dev_password@postgres:5432/smartjob_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=smartjob_redis_password
      - REDIS_URL=redis://:smartjob_redis_password@redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3001
      - AI_SERVICE_URL=http://ai-service:8000
      - STRIPE_API_KEY=${STRIPE_API_KEY:-sk_test_placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - smartjob-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartjob-frontend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=/ws
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - '3001:3001'
    networks:
      - smartjob-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartjob-ai-service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=smartjob_redis_password
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - smartjob-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartjob-network:
    driver: bridge
