name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Shared
        run: npm run build -w shared

  backend:
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint -w backend
      - name: Typecheck
        run: npm run typecheck -w backend
      - name: Test
        run: npm run test -w backend

  frontend:
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint -w frontend
      - name: Typecheck
        run: npm run typecheck -w frontend
      - name: Test
        run: npm run test -w frontend

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov
      - name: Lint
        run: |
          cd ai-service
          ruff check .
      - name: Typecheck
        run: |
          cd ai-service
          mypy .
      - name: Test
        run: |
          cd ai-service
          pytest
